services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: prod
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9000"

  frontend:
    build:
      context: ./frontend
      target: prod

  nginx:
    build:
      context: ./nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    volumes_from:
      - frontend

volumes:
  db_data:

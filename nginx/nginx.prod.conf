server {
    listen 80;
    server_name localhost;

    client_max_body_size 64M;

    # Fichiers statiques React buildés (copiés dans l'image nginx prod)
    root /usr/share/nginx/html;
    index index.html;

    # API Symfony via PHP-FPM
    location ~ ^/api {
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 300;

        # Cache désactivé pour l'API
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # React SPA — toutes les routes renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fichiers statiques avec cache long
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sécurité : bloquer les fichiers cachés
    location ~ /\. {
        deny all;
    }
}
